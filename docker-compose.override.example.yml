# Dev overrides for Mac (Docker UDP doesn't work on Mac for collector)
# Copy to docker-compose.override.yml to use:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#
# Usage: docker compose up -d   → starts clickhouse + backend only
#        docker compose --profile prod up -d  → starts everything

services:
  clickhouse:
    ports:
      - "8123:8123"
      - "9000:9000"

  backend:
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      - JWT_SECRET=dev-only-secret-not-for-production-1234567890

  collector:
    profiles: ["prod"]

  frontend:
    profiles: ["prod"]
