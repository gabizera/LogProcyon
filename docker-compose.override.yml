# Dev overrides for Mac (Docker UDP doesn't work on Mac for collector)
# Usage: docker compose up -d   → starts clickhouse + backend only
#        docker compose --profile prod up -d  → starts everything including collector and frontend

services:
  clickhouse:
    ports:
      - "8123:8123"
      - "9000:9000"

  backend:
    ports:
      - "3000:3000"

  collector:
    profiles: ["prod"]

  frontend:
    profiles: ["prod"]
