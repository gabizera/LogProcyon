# LogProcyon — CORE stack
# ClickHouse + Collector. Nunca é reiniciado em deploys de app.
# Volumes são external pra sobreviver a stack rm/recreate.
version: "3.8"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    volumes:
      - log_clickhouse_store:/var/lib/clickhouse
      - /opt/log/clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      procyon_net:
        aliases:
          - clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  collector:
    image: logprocyon-collector:latest
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - LISTEN_PORT=514
      - BATCH_SIZE=100
      - FLUSH_INTERVAL=2000
      - TZ_OFFSET_HOURS=-3
      - DATA_DIR=/data
    volumes:
      - log_shared:/data
    networks:
      - procyon_net
    ports:
      - target: 514
        published: 514
        protocol: udp
        mode: host
      - target: 2055
        published: 2055
        protocol: udp
        mode: host
      - target: 9995
        published: 9995
        protocol: udp
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  log_clickhouse_store:
    external: true
  log_shared:
    external: true

networks:
  procyon_net:
    external: true
