# LogProcyon — APP stack
# Backend (NestJS) + Frontend (nginx/React).
# Atualizado toda hora em deploys normais. Zero impacto no CORE.
version: "3.8"

services:
  backend:
    image: logprocyon-backend:latest
    environment:
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - DATA_DIR=/data
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=https://log.procyontecnologia.net
      - MULTI_TENANT_MODE=${MULTI_TENANT_MODE:-false}
    volumes:
      - log_shared:/data
    networks:
      - procyon_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  frontend:
    image: logprocyon-frontend:latest
    networks:
      - procyon_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.logprocyon.rule=Host(`log.procyontecnologia.net`)"
        - "traefik.http.routers.logprocyon.entrypoints=websecure"
        - "traefik.http.routers.logprocyon.tls=true"
        - "traefik.http.routers.logprocyon.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.logprocyon.loadbalancer.server.port=80"

volumes:
  log_shared:
    external: true

networks:
  procyon_net:
    external: true
